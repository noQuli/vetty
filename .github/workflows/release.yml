name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ============================================================================
  # Build release binaries
  # ============================================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: vetty-linux-x86_64
          - target: x86_64-unknown-linux-musl
            artifact: vetty-linux-x86_64-musl
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build agent (musl static)
        run: |
          rustup target add x86_64-unknown-linux-musl
          cargo build --target x86_64-unknown-linux-musl --release -p vetty-agent

      - name: Package binaries
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/vetty dist/${{ matrix.artifact }}/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/vetty-daemon dist/${{ matrix.artifact }}/ 2>/dev/null || true
          cp target/x86_64-unknown-linux-musl/release/vetty-agent dist/${{ matrix.artifact }}/
          cp -r guest/ dist/${{ matrix.artifact }}/guest/
          cp -r image/*.sh dist/${{ matrix.artifact }}/
          cp README.md LICENSE dist/${{ matrix.artifact }}/
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  # ============================================================================
  # Build GUI (Electron)
  # ============================================================================
  gui:
    name: Build GUI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package GUI
        run: |
          tar czf ../vetty-gui.tar.gz dist/ electron/ package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vetty-gui
          path: vetty-gui.tar.gz

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  release:
    name: Create Release
    needs: [build, gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
